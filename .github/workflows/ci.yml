---
name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set Up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Check
        run: make check

      - name: Build
        run: make build

      - name: Pedant
        id: pedant
        continue-on-error: true
        uses: goeselt/pedant@a62f5beea373a55846791c2113ceacd07f114826 # v1.2.2
        with:
          summary-github-step: true

      - name: Publish Pedant Report
        if: always()
        uses: goeselt/remark@b5a3f7c0d7b25e6634f1f2f9ef13e6b808370972 # v1.0.3
        with:
          body: ${{ steps.pedant.outputs.summary }}
          comment-key: pedant
          github-token: ${{ secrets.GITHUB_TOKEN }}
          skip-unchanged: true

      - name: Fail On Pedant Findings
        if: steps.pedant.outcome != 'success'
        run: exit 1
