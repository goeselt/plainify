---
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      attestations: write
    steps:
      - id: app
        name: Generate App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_KEY }}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # bumpkin needs full history to find the previous release tag
          token: ${{ steps.app.outputs.token }}

      - id: bumpkin
        name: Resolve Version
        uses: goeselt/bumpkin@8e5d31105440aa42cd53d50b22c954be38bc2dd0 # v1.0.1
        with:
          initial-version: '1.0.0'

      - name: Set Up Go
        if: steps.bumpkin.outputs.release-needed == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Import Signing Key
        if: steps.bumpkin.outputs.release-needed == 'true'
        env:
          SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: echo "$SIGNING_KEY" | base64 -d | gpg --import --batch

      - name: Create Signed Tag
        if: steps.bumpkin.outputs.release-needed == 'true'
        env:
          RELEASE_TAG: ${{ steps.bumpkin.outputs.release-tag }}
          GIT_USER_NAME: ${{ vars.RELEASE_SIGNING_USER }}
          GIT_USER_EMAIL: ${{ vars.RELEASE_SIGNING_EMAIL }}
        run: |
          git config user.name "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"
          git config tag.gpgsign true
          git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Run GoReleaser
        if: steps.bumpkin.outputs.release-needed == 'true'
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ steps.app.outputs.token }}

      - name: Attest Build Provenance
        if: steps.bumpkin.outputs.release-needed == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
